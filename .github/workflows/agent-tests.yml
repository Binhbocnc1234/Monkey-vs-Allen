name: Agent Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  unity-tests:
    name: Tier 1/2/3 - Unity self-hosted
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Unity path
        shell: powershell
        env:
          UNITY_PATH: ${{ secrets.UNITY_PATH }}
        run: |
          if (-not $env:UNITY_PATH) {
            Write-Error "Set UNITY_PATH secret to the Unity editor executable path."
            exit 1
          }
      - name: Generate Unity project files
        shell: powershell
        env:
          UNITY_PATH: ${{ secrets.UNITY_PATH }}
        run: |
          New-Item -ItemType Directory -Force -Path Logs | Out-Null
          & "$env:UNITY_PATH" -batchmode -quit -projectPath "$pwd" -executeMethod TestWorkflowProjectFiles.Generate -logFile "Logs/unity-project-files.log"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Unity project file generation failed. See Logs/unity-project-files.log."
            exit $LASTEXITCODE
          }
      - name: Run full test workflow
        shell: powershell
        env:
          UNITY_PATH: ${{ secrets.UNITY_PATH }}
        run: |
          python tools/run_tests.py --scope full --unity-path "$env:UNITY_PATH" --logs-dir Logs --allow-missing-tier1-projects
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-test-logs
          path: Logs/**
