name: Agent Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  tier1-compile:
    name: Tier 1 — Compile (dotnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'
      - name: Restore
        run: dotnet restore "Monkey vs Allen project.sln"
      - name: Build solution
        run: dotnet build "Monkey vs Allen project.sln" --configuration Release --no-restore
      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: tier1-build-log
          path: '**/bin/**'

  unity-tests:
    name: Tier 2/3 — Unity (self-hosted)
    runs-on: [self-hosted, windows]
    needs: tier1-compile
    steps:
      - uses: actions/checkout@v4
      - name: Ensure UNITY path
        env:
          UNITY_PATH: ${{ secrets.UNITY_PATH }}
        run: |
          if (-not $env:UNITY_PATH) { Write-Error "Set UNITY_PATH secret to Unity editor executable path" ; exit 1 }
      - name: Run tests via run_tests.ps1
        shell: powershell
        run: |
          $env:UNITY_EDITOR_PATH = "${{ secrets.UNITY_PATH }}"
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          .\tools\run_tests.ps1 -scope full -unityPath $env:UNITY_EDITOR_PATH -logsDir Logs
      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-logs
          path: Logs/**
